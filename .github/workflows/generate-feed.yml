name: Generate RSS Feed

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

concurrency:
  group: generate-rss-feed
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate feed
        run: python scripts/feedgen.py

      - name: Create Pull Request (rss update)
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Auto update RSS feed"
          title: "Auto update RSS feed"
          body: "Automated update of feeds/png-latest-news.xml"
          branch: bot/rss-update
          base: main
          delete-branch: true
          add-paths: |
            feeds/png-latest-news.xml

      - name: Merge Pull Request
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          set -e
      
          echo "Merging PR #$PR_NUMBER"
      
          if gh pr merge "$PR_NUMBER" --squash --delete-branch; then
            echo "PR #$PR_NUMBER merged successfully."
          else
            echo "Direct merge failed. Trying auto-merge as fallback..."
            gh pr merge "$PR_NUMBER" --auto --squash --delete-branch
          fi
