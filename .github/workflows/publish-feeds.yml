name: Publish Feeds

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/publish-feeds.yml"
      - "tools/publish-feeds.mjs"
      - "scripts/feedgen.py"
      - "feeds/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate local filtered feeds
        run: python scripts/feedgen.py

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch and write published feeds
        env:
          WORKER_BASE: ${{ secrets.WORKER_BASE }}
        run: node tools/publish-feeds.mjs

      - name: Stop if no feed changes
        id: diffcheck
        run: |
          if git diff --quiet -- feeds; then
            echo "no_changes=true" >> $GITHUB_OUTPUT
            echo "No feed changes. Exiting."
          else
            echo "no_changes=false" >> $GITHUB_OUTPUT
            echo "Feed changes detected."
          fi

      - name: Create Pull Request (feeds update)
        if: steps.diffcheck.outputs.no_changes != 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: feeds-bot
          base: main
          title: "Update published feeds"
          commit-message: "Update published feeds"
          body: "Automated update of feeds/*.xml from published feed list."
          add-paths: |
            feeds/**
          labels: |
            automation
          delete-branch: true

      - name: Merge Pull Request
        if: steps.diffcheck.outputs.no_changes != 'true' && steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          set -e
      
          echo "Merging PR #$PR_NUMBER"
      
          if gh pr merge "$PR_NUMBER" --squash --delete-branch; then
            echo "PR #$PR_NUMBER merged successfully."
          else
            echo "Direct merge failed. Trying auto-merge as fallback..."
            gh pr merge "$PR_NUMBER" --auto --squash --delete-branch
          fi
