name: Publish Feeds

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch and write published feeds
        env:
          WORKER_BASE: ${{ secrets.WORKER_BASE }}
        run: node tools/publish-feeds.mjs

      - name: Create Pull Request (feeds update)
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: feeds-bot
          base: main
          title: "Update published feeds"
          commit-message: "Update published feeds"
          body: "Automated update of feeds/*.xml from published feed list."
          add-paths: |
            feeds/**
          labels: |
            automation
